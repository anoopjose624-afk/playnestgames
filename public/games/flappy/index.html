<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Flappy Sky</title>
  <link rel="stylesheet" href="/playnest-engine/playnest-mobile.css" />
  <style>
    body { background: #0ea5e9; }
    canvas { border: 2px solid #fff; }
  </style>
</head>
<body>
  <div class="pn-game-wrap">
    <canvas id="c" width="360" height="480"></canvas>
    <p class="pn-hint">Tap or press action to flap</p>
  </div>
  <script type="module">
    import PlayNest from "/playnest-engine/playnest-bootstrap.js";

    const c = document.getElementById("c"), ctx = c.getContext("2d");
    let bird = { y: 200, vy: 0 }, pipes = [], frame = 0, score = 0, dead = false, deathSfx = false;

    PlayNest.init({
      gameId: "flappy",
      lockPage: true,
      toolbar: true,
      canvas: "#c",
      canvasSize: { baseWidth: 360, baseHeight: 480 },
      mobile: { joystick: false, action: true, actionLabel: "↑", pause: true },
    });
    if (PlayNest.mobile) {
      PlayNest.mobile.options.onAction = flap;
      PlayNest.mobile.options.onTap = flap;
    }

    function flap() {
      if (dead) { dead = false; bird = { y: 200, vy: 0 }; pipes = []; score = 0; frame = 0; deathSfx = false; PlayNest.sfx?.tap(); return; }
      bird.vy = -6;
      PlayNest.sfx?.jump();
    }
    document.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); flap(); } });
    c.addEventListener("click", flap);

    function loop() {
      frame++;
      bird.vy += 0.35;
      bird.y += bird.vy;
      if (frame % 70 === 0) pipes.push({ x: c.width, gap: 120, top: 60 + Math.random() * 180 });
      pipes.forEach((p) => { p.x -= 3; });
      pipes = pipes.filter((p) => p.x > -60);
      pipes.forEach((p) => {
        if (p.x < 55 && p.x + 50 > 35) {
          if (bird.y < p.top || bird.y > p.top + p.gap) dead = true;
        }
        if (p.x === 30) score++;
      });
      if (bird.y < 0 || bird.y > c.height) dead = true;
      if (dead && !deathSfx) { deathSfx = true; PlayNest.sfx?.lose(); }
      if (dead) PlayNest.save.setHighScore(score);

      ctx.fillStyle = "#7dd3fc"; ctx.fillRect(0, 0, c.width, c.height);
      ctx.fillStyle = "#22c55e";
      pipes.forEach((p) => {
        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 50, c.height);
      });
      ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(50, bird.y, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = "24px sans-serif";
      ctx.fillText(score, c.width / 2 - 10, 50);
      ctx.fillText("Best: " + PlayNest.save.getHighScore(), c.width / 2 - 40, 80);
      if (dead) ctx.fillText("Tap to restart", 90, 240);
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
