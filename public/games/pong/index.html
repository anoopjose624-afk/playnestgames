<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Pong</title>
  <link rel="stylesheet" href="/playnest-engine/playnest-mobile.css" />
  <style>
    body { background: #0f172a; color: #fff; font-family: system-ui, sans-serif; }
    canvas { border: 2px solid #38bdf8; }
  </style>
</head>
<body>
  <div class="pn-game-wrap">
    <canvas id="c" width="600" height="360"></canvas>
    <p class="pn-hint">Drag on court or use joystick to move paddle</p>
  </div>
  <script type="module">
    import PlayNest from "/playnest-engine/playnest-bootstrap.js";
    import { bridgeJoystickToKeys } from "/playnest-engine/keyboardBridge.js";

    const c = document.getElementById("c"), ctx = c.getContext("2d");
    let ball = { x: 300, y: 180, vx: 4, vy: 3 }, p1 = 140, p2 = 140, s1 = 0, s2 = 0;
    const ph = 70, pw = 12;
    let running = true;

    PlayNest.init({
      gameId: "pong",
      lockPage: true,
      toolbar: true,
      canvas: "#c",
      canvasSize: { baseWidth: 600, baseHeight: 360 },
      mobile: { joystick: true, action: false, pause: true },
    });

    function setPaddleFromY(clientY) {
      const r = c.getBoundingClientRect();
      p1 = (clientY - r.top) * (c.height / r.height) - ph / 2;
      p1 = Math.max(20, Math.min(c.height - ph - 20, p1));
    }

    document.addEventListener("mousemove", (e) => setPaddleFromY(e.clientY));
    c.addEventListener("touchmove", (e) => {
      e.preventDefault();
      setPaddleFromY(e.touches[0].clientY);
    }, { passive: false });

    if (PlayNest.mobile) {
      PlayNest.mobile.options.onJoystick = ({ y }) => {
        p1 += y * 12;
        p1 = Math.max(20, Math.min(c.height - ph - 20, p1));
      };
    }

    function reset() {
      ball = { x: 300, y: 180, vx: (Math.random() > 0.5 ? 4 : -4), vy: (Math.random() - 0.5) * 6 };
      running = true;
    }

    function loop() {
      if (!running) return;
      ball.x += ball.vx; ball.y += ball.vy;
      if (ball.y < 10 || ball.y > c.height - 10) ball.vy *= -1;
      if (ball.x < 30 + pw && ball.y > p1 && ball.y < p1 + ph) { ball.vx = Math.abs(ball.vx); ball.vx += 0.2; PlayNest.sfx?.bounce(); }
      if (ball.x > c.width - 40 && ball.y > p2 && ball.y < p2 + ph) { ball.vx = -Math.abs(ball.vx); ball.vx -= 0.2; PlayNest.sfx?.bounce(); }
      if (ball.x < 0) { s2++; PlayNest.sfx?.score(); reset(); }
      if (ball.x > c.width) { s1++; PlayNest.sfx?.score(); reset(); }
      p2 = Math.max(20, Math.min(c.height - ph - 20, p2 + (ball.y - (p2 + ph / 2)) * 0.08));
      if (s1 >= 5 || s2 >= 5) {
        ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#fff"; ctx.font = "32px sans-serif";
        ctx.fillText("Winner: " + (s1 >= 5 ? "You" : "CPU"), 160, 180);
        PlayNest.save.setHighScore(s1);
        PlayNest.sfx?.win();
        return;
      }
      ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, c.width, c.height);
      ctx.setLineDash([8, 12]); ctx.strokeStyle = "#334155";
      ctx.beginPath(); ctx.moveTo(c.width / 2, 0); ctx.lineTo(c.width / 2, c.height); ctx.stroke();
      ctx.fillStyle = "#38bdf8"; ctx.fillRect(16, p1, pw, ph);
      ctx.fillStyle = "#f472b6"; ctx.fillRect(c.width - 28, p2, pw, ph);
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2); ctx.fill();
      ctx.font = "24px sans-serif"; ctx.fillText(s1 + " - " + s2, c.width / 2 - 20, 40);
      requestAnimationFrame(loop);
    }
    reset();
    loop();
  </script>
</body>
</html>
