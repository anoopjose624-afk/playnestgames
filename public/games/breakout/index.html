<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brick Breaker</title>
  <style>
    body { margin: 0; background: #1c1917; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { max-width: 100%; }
  </style>
</head>
<body>
  <canvas id="c" width="480" height="360"></canvas>
  <script>
    const c = document.getElementById("c"), ctx = c.getContext("2d");
    let paddle = 200, ball = { x: 240, y: 300, vx: 3, vy: -3 };
    let bricks = [];
    for (let r = 0; r < 5; r++) for (let col = 0; col < 8; col++) bricks.push({ x: col * 58 + 12, y: r * 24 + 40, w: 52, h: 18, alive: true });
    let mx = 240;
    c.addEventListener("mousemove", e => { const r = c.getBoundingClientRect(); mx = (e.clientX - r.left) * (c.width / r.width); });
    c.addEventListener("touchmove", e => { const r = c.getBoundingClientRect(); mx = (e.touches[0].clientX - r.left) * (c.width / r.width); });
    function loop() {
      ball.x += ball.vx; ball.y += ball.vy;
      if (ball.x < 8 || ball.x > c.width - 8) ball.vx *= -1;
      if (ball.y < 8) ball.vy *= -1;
      paddle = mx - 40;
      if (ball.y > 320 && ball.x > paddle && ball.x < paddle + 80) { ball.vy = -Math.abs(ball.vy); ball.vx += (ball.x - paddle - 40) * 0.05; }
      if (ball.y > c.height) { ball = { x: 240, y: 300, vx: 3, vy: -3 }; }
      bricks.forEach(b => {
        if (b.alive && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
          b.alive = false; ball.vy *= -1;
        }
      });
      ctx.fillStyle = "#1c1917"; ctx.fillRect(0, 0, c.width, c.height);
      const colors = ["#f97316","#eab308","#22c55e","#3b82f6","#a855f7"];
      bricks.forEach((b, i) => {
        if (!b.alive) return;
        ctx.fillStyle = colors[Math.floor(i / 8) % colors.length];
        ctx.fillRect(b.x, b.y, b.w, b.h);
      });
      ctx.fillStyle = "#94a3b8"; ctx.fillRect(paddle, 330, 80, 12);
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2); ctx.fill();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
