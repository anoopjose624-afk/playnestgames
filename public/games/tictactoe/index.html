<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="/playnest-engine/playnest-mobile.css" />
  <style>
    body { background: #334155; color: #fff; font-family: system-ui, sans-serif; }
    .board { display: grid; grid-template-columns: repeat(3, minmax(72px, 90px)); gap: clamp(6px, 2vw, 8px); }
    .cell { aspect-ratio: 1; background: #475569; border: none; border-radius: 12px; font-size: clamp(32px, 10vw, 42px); font-weight: bold; color: #fff; cursor: pointer; touch-action: manipulation; min-height: 48px; min-width: 48px; }
    .cell:hover { background: #64748b; }
  </style>
</head>
<body>
  <div class="pn-game-wrap">
    <p id="status" class="pn-hud">Your turn (X)</p>
    <div class="board pn-responsive-grid" id="board"></div>
  </div>
  <script type="module">
    import PlayNest from "/playnest-engine/playnest-bootstrap.js";
    PlayNest.init({
      gameId: "tictactoe",
      lockPage: true,
      toolbar: true,
      mobile: { joystick: false, action: false, pause: true },
    });

    let board = Array(9).fill(""), player = "X", over = false, wins = 0;
    const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const el = document.getElementById("board"), status = document.getElementById("status");
    function check(w) {
      return winPatterns.some(([a,b,c]) => board[a] === w && board[b] === w && board[c] === w);
    }
    function cpu() {
      const empty = board.map((v,i) => v ? -1 : i).filter(i => i >= 0);
      if (!empty.length) return;
      for (const i of empty) {
        board[i] = "O";
        if (check("O")) { render(); return; }
        board[i] = "";
      }
      for (const i of empty) {
        board[i] = "X";
        if (check("X")) { board[i] = "O"; render(); return; }
        board[i] = "";
      }
      board[empty[Math.floor(Math.random() * empty.length)]] = "O";
      render();
    }
    function render() {
      el.innerHTML = "";
      board.forEach((v, i) => {
        const btn = document.createElement("button");
        btn.className = "cell pn-touch-btn";
        btn.textContent = v;
        btn.disabled = !!v || over || player !== "X";
        btn.onclick = () => {
          if (over || board[i]) return;
          board[i] = "X";
          PlayNest.sfx?.tap();
          if (check("X")) { status.textContent = "You win!"; over = true; wins++; PlayNest.save.setHighScore(wins); PlayNest.sfx?.win(); render(); return; }
          if (board.every(c => c)) { status.textContent = "Draw!"; over = true; render(); return; }
          player = "O";
          status.textContent = "CPU thinking...";
          setTimeout(() => {
            cpu();
            if (check("O")) { status.textContent = "CPU wins!"; over = true; PlayNest.sfx?.lose(); }
            else if (board.every(c => c)) { status.textContent = "Draw!"; over = true; }
            else { player = "X"; status.textContent = "Your turn (X)"; }
            render();
          }, 400);
          render();
        };
        el.appendChild(btn);
      });
    }
    render();
  </script>
</body>
</html>
