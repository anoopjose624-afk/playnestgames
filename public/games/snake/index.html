<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #052e16; color: #fff; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { background: #064e3b; border: 3px solid #4ade80; border-radius: 8px; max-width: 100%; }
    p { margin-top: 12px; font-size: 14px; opacity: 0.8; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="400"></canvas>
  <p>Arrow keys or swipe to move</p>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const size = 20;
    const cols = canvas.width / size;
    let snake = [{ x: 10, y: 10 }];
    let dir = { x: 1, y: 0 };
    let food = { x: 15, y: 10 };
    let score = 0;
    let over = false;
    function randFood() {
      food = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * cols) };
      if (snake.some(s => s.x === food.x && s.y === food.y)) randFood();
    }
    function tick() {
      if (over) return;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= cols || snake.some(s => s.x === head.x && s.y === head.y)) {
        over = true;
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) { score++; randFood(); } else snake.pop();
    }
    function draw() {
      ctx.fillStyle = "#064e3b";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ef4444";
      ctx.fillRect(food.x * size, food.y * size, size - 2, size - 2);
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#4ade80" : "#22c55e";
        ctx.fillRect(s.x * size, s.y * size, size - 2, size - 2);
      });
      ctx.fillStyle = "#fff";
      ctx.font = "16px sans-serif";
      ctx.fillText("Score: " + score, 8, 24);
      if (over) { ctx.fillText("Game Over - press Space", 80, 200); }
    }
    document.addEventListener("keydown", e => {
      if (e.code === "Space" && over) { snake = [{ x: 10, y: 10 }]; dir = { x: 1, y: 0 }; score = 0; over = false; randFood(); return; }
      const map = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };
      const d = map[e.code];
      if (d && (d.x !== -dir.x || d.y !== -dir.y)) dir = d;
    });
    setInterval(() => { tick(); draw(); }, 120);
    draw();
  </script>
</body>
</html>
