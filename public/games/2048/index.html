<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>2048</title>
  <link rel="stylesheet" href="/playnest-engine/playnest-mobile.css" />
  <style>
    body { background: #78716c; color: #fff; font-family: system-ui, sans-serif; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(56px, 70px)); gap: clamp(4px, 2vw, 8px); background: #57534e; padding: 8px; border-radius: 8px; }
    .cell { aspect-ratio: 1; background: #a8a29e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: clamp(16px, 5vw, 22px); color: #444; }
    .cell.n2 { background: #fef3c7; }
    .cell.n4 { background: #fde68a; }
    .cell.n8 { background: #fcd34d; color: #fff; }
    .cell.n16 { background: #fbbf24; color: #fff; }
    .cell.n32 { background: #f97316; color: #fff; }
    .cell.n64 { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <div class="pn-game-wrap">
    <p id="score" class="pn-hud">Score: 0</p>
    <div class="grid pn-responsive-grid" id="grid"></div>
    <p class="pn-hint">Arrow keys or swipe to move</p>
  </div>
  <script type="module">
    import PlayNest from "/playnest-engine/playnest-bootstrap.js";

    PlayNest.init({
      gameId: "2048",
      lockPage: true,
      toolbar: true,
      mobile: { joystick: false, action: false, pause: true },
    });

    let grid = Array(4).fill(0).map(() => Array(4).fill(0));
    const saved = PlayNest.save.loadAutoSave();
    if (saved?.grid) grid = saved.grid;

    function addTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }
    function slide(row) {
      const filtered = row.filter((x) => x);
      const merged = [];
      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] && filtered[i] === filtered[i + 1]) {
          merged.push(filtered[i] * 2);
          i++;
        } else merged.push(filtered[i] || 0);
      }
      while (merged.length < 4) merged.push(0);
      return merged;
    }
    function move(dir) {
      const old = JSON.stringify(grid);
      if (dir === "left") grid = grid.map(slide);
      if (dir === "right") grid = grid.map((r) => slide([...r].reverse()).reverse());
      if (dir === "up") {
        for (let c = 0; c < 4; c++) {
          const col = slide(grid.map((r) => r[c]));
          col.forEach((v, r) => { grid[r][c] = v; });
        }
      }
      if (dir === "down") {
        for (let c = 0; c < 4; c++) {
          const col = slide(grid.map((r) => r[c]).reverse()).reverse();
          col.forEach((v, r) => { grid[r][c] = v; });
        }
      }
      if (JSON.stringify(grid) !== old) { addTile(); PlayNest.sfx?.move(); }
      render();
    }
    function render() {
      const el = document.getElementById("grid");
      el.innerHTML = "";
      let score = 0;
      grid.forEach((row) =>
        row.forEach((v) => {
          score += v;
          const d = document.createElement("div");
          d.className = "cell" + (v ? " n" + v : "");
          d.textContent = v || "";
          el.appendChild(d);
        }),
      );
      document.getElementById("score").textContent = "Score: " + score + "  Best: " + PlayNest.save.setHighScore(score);
      PlayNest.save.save("autosave", { grid });
    }
    document.addEventListener("keydown", (e) => {
      const m = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
      if (m[e.code]) { e.preventDefault(); move(m[e.code]); }
    });
    if (PlayNest.mobile) {
      PlayNest.mobile.options.onSwipe = (type) => {
        const map = { left: "left", right: "right", up: "up", down: "down" };
        if (map[type]) move(map[type]);
      };
    }
    if (!saved) { addTile(); addTile(); }
    render();
    PlayNest.save.autoSave(5000, () => ({ grid }));
  </script>
</body>
</html>
