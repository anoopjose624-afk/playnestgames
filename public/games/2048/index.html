<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2048</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #78716c; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(4, 70px); gap: 8px; background: #57534e; padding: 8px; border-radius: 8px; }
    .cell { width: 70px; height: 70px; background: #a8a29e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; color: #444; }
    .cell.n2 { background: #fef3c7; }
    .cell.n4 { background: #fde68a; }
    .cell.n8 { background: #fcd34d; color: #fff; }
    .cell.n16 { background: #fbbf24; color: #fff; }
    .cell.n32 { background: #f97316; color: #fff; }
    .cell.n64 { background: #ef4444; color: #fff; }
    p { margin-top: 12px; }
  </style>
</head>
<body>
  <p id="score">Score: 0</p>
  <div class="grid" id="grid"></div>
  <p>Arrow keys to move</p>
  <script>
    let grid = Array(4).fill(0).map(() => Array(4).fill(0));
    function addTile() {
      const empty = [];
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }
    function slide(row) {
      const filtered = row.filter(x => x);
      const merged = [];
      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] && filtered[i] === filtered[i + 1]) {
          merged.push(filtered[i] * 2);
          i++;
        } else merged.push(filtered[i] || 0);
      }
      while (merged.length < 4) merged.push(0);
      return merged;
    }
    function move(dir) {
      const old = JSON.stringify(grid);
      if (dir === "left") grid = grid.map(slide);
      if (dir === "right") grid = grid.map(r => slide([...r].reverse()).reverse());
      if (dir === "up") {
        for (let c = 0; c < 4; c++) {
          const col = slide(grid.map(r => r[c]));
          col.forEach((v, r) => grid[r][c] = v);
        }
      }
      if (dir === "down") {
        for (let c = 0; c < 4; c++) {
          const col = slide(grid.map(r => r[c]).reverse()).reverse();
          col.forEach((v, r) => grid[r][c] = v);
        }
      }
      if (JSON.stringify(grid) !== old) addTile();
      render();
    }
    function render() {
      const el = document.getElementById("grid");
      el.innerHTML = "";
      let score = 0;
      grid.forEach(row => row.forEach(v => {
        score += v;
        const d = document.createElement("div");
        d.className = "cell" + (v ? " n" + v : "");
        d.textContent = v || "";
        el.appendChild(d);
      }));
      document.getElementById("score").textContent = "Score: " + score;
    }
    document.addEventListener("keydown", e => {
      const m = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
      if (m[e.code]) { e.preventDefault(); move(m[e.code]); }
    });
    addTile(); addTile(); render();
  </script>
</body>
</html>
