<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Whack-a-Mole</title>
  <link rel="stylesheet" href="/playnest-engine/playnest-mobile.css" />
  <style>
    body { background: #713f12; color: #fff; font-family: system-ui, sans-serif; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(80px, 100px)); gap: clamp(8px, 2vw, 12px); }
    .hole { aspect-ratio: 1; background: #451a03; border-radius: 50%; display: flex; align-items: flex-end; justify-content: center; cursor: pointer; overflow: hidden; touch-action: manipulation; min-height: 48px; }
    .mole { font-size: clamp(36px, 12vw, 48px); transform: translateY(100%); transition: transform 0.15s; }
    .hole.up .mole { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="pn-game-wrap">
    <p id="info" class="pn-hud">Score: 0 | Time: 30</p>
    <div class="grid pn-responsive-grid" id="grid"></div>
  </div>
  <script type="module">
    import PlayNest from "/playnest-engine/playnest-bootstrap.js";
    PlayNest.init({
      gameId: "whack",
      lockPage: true,
      toolbar: true,
      mobile: { joystick: false, action: false, pause: true },
    });

    const grid = document.getElementById("grid");
    const holes = [];
    for (let i = 0; i < 9; i++) {
      const h = document.createElement("div");
      h.className = "hole";
      h.innerHTML = '<span class="mole">🐹</span>';
      h.onclick = () => {
        if (h.classList.contains("up")) {
          score++;
          PlayNest.sfx?.hit();
          h.classList.remove("up");
          document.getElementById("info").textContent = "Score: " + score + " | Time: " + time;
        }
      };
      grid.appendChild(h);
      holes.push(h);
    }
    let score = 0, time = 30, active = -1;
    const interval = PlayNest.isLowEnd() ? 1000 : 900;
    setInterval(() => {
      if (time <= 0) return;
      if (active >= 0) holes[active].classList.remove("up");
      active = Math.floor(Math.random() * 9);
      holes[active].classList.add("up");
      setTimeout(() => holes[active].classList.remove("up"), 700);
    }, interval);
    setInterval(() => {
      if (time <= 0) return;
      time--;
      document.getElementById("info").textContent = "Score: " + score + " | Time: " + time;
      if (time === 0) {
        PlayNest.save.setHighScore(score);
        PlayNest.sfx?.win();
        document.getElementById("info").textContent = "Done! Score: " + score + " Best: " + PlayNest.save.getHighScore();
      }
    }, 1000);
  </script>
</body>
</html>
