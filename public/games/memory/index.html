<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Match</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #3b0764; color: #fff; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(4, 72px); gap: 10px; }
    .card { width: 72px; height: 96px; background: #7c3aed; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; user-select: none; }
    .card.flipped, .card.matched { background: #c4b5fd; color: #3b0764; }
    .card.matched { opacity: 0.6; }
    p { margin-top: 16px; }
  </style>
</head>
<body>
  <p id="moves">Moves: 0</p>
  <div class="grid" id="grid"></div>
  <script>
    const emojis = ["🎮","🎯","🎲","🎪","🎨","🎭","🎸","🎺"];
    let cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
    let flipped = [], moves = 0, matched = 0;
    const grid = document.getElementById("grid"), movesEl = document.getElementById("moves");
    cards.forEach((emoji, i) => {
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.i = i;
      el.onclick = () => {
        if (flipped.length === 2 || el.classList.contains("flipped") || el.classList.contains("matched")) return;
        el.classList.add("flipped");
        el.textContent = emoji;
        flipped.push({ el, emoji });
        if (flipped.length === 2) {
          moves++;
          movesEl.textContent = "Moves: " + moves;
          const [a, b] = flipped;
          if (a.emoji === b.emoji) {
            a.el.classList.add("matched");
            b.el.classList.add("matched");
            matched += 2;
            flipped = [];
            if (matched === 16) movesEl.textContent = "You win in " + moves + " moves!";
          } else {
            setTimeout(() => {
              a.el.classList.remove("flipped");
              b.el.classList.remove("flipped");
              a.el.textContent = "";
              b.el.textContent = "";
              flipped = [];
            }, 600);
          }
        }
      };
      grid.appendChild(el);
    });
  </script>
</body>
</html>
